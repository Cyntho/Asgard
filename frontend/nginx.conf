server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Statische Files
    location / {
        try_files $uri /index.html;
    }

    # Optional: Proxy für API-Aufrufe, wenn du über Nginx auf das Backend gehst
    # location /api/ {
    #     proxy_pass http://backend:8080/;
    # }
}